<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namen Klick-Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .names-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .name-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .name-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .name-text {
            font-size: 1.3em;
            font-weight: 600;
            color: #444;
            min-width: 150px;
        }
        
        .click-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
                       border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .click-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .counter-display {
            text-align: center;
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .sorted-list {
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .sorted-list h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .sorted-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }
        
        .sorted-item:last-child {
            border-bottom: none;
        }
        
        .rank {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Namen Klick-Counter</h1>
        
        <div class="counter-display">
            Gesamtklicks: <span id="total-counter">0</span>
        </div>
        
        <div class="names-list" id="names-container">
            <!-- Namen werden hier eingefügt -->
        </div>
        
        <div class="sorted-list" id="sorted-container" style="display: none;">
            <h3>📊 Sortiert nach Klicks</h3>
            <div id="sorted-list-content">
                <!-- Sortierte Namen hier -->
            </div>
        </div>
    </div>

    <script>
        // Die 10 Namen
        const names = [
            { name: "Luke", clicks: 0 },
            { name: "Gereon", clicks: 0 },
            { name: "Julius", clicks: 0 },
            { name: "Hannes", clicks: 0 },
            { name: "Enrico", clicks: 0 },
            { name: "Max", clicks: 0 },
            { name: "Elias", clicks: 0 },
            { name: "Magnus", clicks: 0 },
            { name: "Basti", clicks: 0 },
            { name: "Florian", clicks: 0 }
        ];
        
        let totalClicks = 0;
        
        // Initialisierung
        function init() {
            const container = document.getElementById('names-container');
            
            names.forEach((person, index) => {
                const item = document.createElement('div');
                item.className = 'name-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'name-text';
                nameSpan.textContent = person.name;
                
                const btn = document.createElement('button');
                btn.className = 'click-btn';
                btn.textContent = 'Klick mich!';
                btn.onclick = () => handleClick(index);
                
                item.appendChild(nameSpan);
                item.appendChild(btn);
                container.appendChild(item);
            });
        }
        
        // Klick-Handler
        function handleClick(index) {
            // Counter erhöhen
            totalClicks++;
            document.getElementById('total-counter').textContent = totalClicks;
            
            // Einzelnen Counter erhöhen
            names[index].clicks++;
            
            // Liste aktualisieren
            updateSortedList();
        }
        
        // Sortierte Liste aktualisieren
        function updateSortedList() {
            const sortedContainer = document.getElementById('sorted-container');
            const listContent = document.getElementById('sorted-list-content');
            
            // Sortieren nach Klicks (absteigend)
            const sortedNames = [...names].sort((a, b) => b.clicks - a.clicks);
            
            // Container anzeigen
            sortedContainer.style.display = 'block';
            
            // Liste leeren und neu befüllen
            listContent.innerHTML = '';
            
            sortedNames.forEach((person, index) => {
                const item = document.createElement('div');
                item.className = 'sorted-item';
                
                const rank = document.createElement('span');
                rank.className = 'rank';
                rank.textContent = `#${index + 1}`;
                
                const nameText = document.createElement('span');
                nameText.textContent = person.name;
                
                const clickCount = document.createElement('span');
                clickCount.textContent = `${person.clicks} Klick${person.clicks === 1 ? '' : 's'}`;
                
                item.appendChild(rank);
                item.appendChild(nameText);
                item.appendChild(clickCount);
                listContent.appendChild(item);
            });
        }
        
        // Start
        init();
    </script>
</body>
</html>
